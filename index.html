<form id="contact-form" class="reveal" action="https://api.web3forms.com/submit" method="POST">
      <!-- Tu clave real de Web3Forms -->
      <input type="hidden" name="access_key" value="e85bb970-3118-42bf-8796-2f781edc3436">

      <input type="hidden" name="Personajes" id="hidden-characters" value="No seleccionado">
      <input type="hidden" name="Estilo" id="hidden-style" value="No seleccionado">
      <input type="hidden" name="Duration" id="hidden-duration" value="No seleccionado">
      <input type="hidden" name="redirect" value="https://jaseplanet.com">

      <div class="row2">
        <div class="field"><label class="mono" data-i18n="f_name">Nombre</label><input type="text" name="Nombre" required></div>
        <div class="field"><label class="mono" data-i18n="f_country">País</label><input type="text" name="Pais"></div>
      </div>
      <div class="field"><label class="mono" data-i18n="f_email">Email</label><input type="email" name="Email" required></div>

      <div class="field">
        <label class="mono" data-i18n="f_characters">Personajes</label>
        <div class="chips" data-group="characters">
          <button type="button" class="chip" data-value="one" data-i18n="ch_one">Un personaje</button>
          <button type="button" class="chip" data-value="many" data-i18n="ch_many">Más de uno</button>
          <button type="button" class="chip" data-value="none" data-i18n="ch_none">Ninguno</button>
        </div>
      </div>

      <div class="field">
        <label class="mono" data-i18n="f_style">Estilo</label>
        <div class="chips" data-group="style">
          <button type="button" class="chip" data-value="cartoon">Cartoon</button>
          <button type="button" class="chip" data-value="realista" data-i18n="st_real">Realista</button>
          <button type="button" class="chip" data-value="cartoon-realista" data-i18n="st_cr">Cartoon Realista</button>
          <button type="button" class="chip" data-value="lowpoly">Lowpoly</button>
          <button type="button" class="chip" data-value="ps1">PS1</button>
          <button type="button" class="chip" data-value="vfx">VFX</button>
          <button type="button" class="chip" data-value="other" data-i18n="st_other">Otro estilo</button>
        </div>
      </div>

      <div class="field">
        <label class="mono" data-i18n="f_duration">Duración</label>
        <div class="chips" data-group="duration">
          <button type="button" class="chip" data-value="loop" data-i18n="du_loop">Loop 15-30 seg</button>
          <button type="button" class="chip" data-value="1min" data-i18n="du_1m">1 Minuto</button>
          <button type="button" class="chip" data-value="song" data-i18n="du_song">Una Canción</button>
          <button type="button" class="chip" data-value="other" data-i18n="du_other">Otra Duración</button>
        </div>
      </div>

      <div class="field">
        <label class="mono" data-i18n="f_idea">Tu idea</label>
        <textarea name="Idea Proyecto" data-i18n-ph="ph_idea" placeholder="Contame brevemente qué tenés en mente para ponernos en marcha: referencias, mood, etc."></textarea>
      </div>

      <button type="submit" class="submit" data-i18n="f_send">Enviar Consulta</button>
    </form>
